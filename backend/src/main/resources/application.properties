spring.application.name=GDP

# Configuration de la datasource (valeurs injectées via variables d'environnement, voir .env.example)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# Configuration JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Environments that existed before Flyway (schema already created by the old ddl-auto=update,
# e.g. the current Neon dev database) have no flyway_schema_history table yet. baseline-on-migrate
# makes Flyway record V1 as already applied instead of trying to re-run its CREATE TABLEs against
# tables that already exist. A genuinely empty database (fresh Testcontainers/local Postgres) is
# unaffected and just runs V1 normally.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.show-sql=true  
spring.jpa.properties.hibernate.format_sql=true

#jwt parameters (secret injected via .env, see .env.example — never commit a real value here)
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

#dns frontend
url.front=http://localhost:3000

# Pour que SameSite=Strict fonctionne
server.servlet.session.cookie.same-site=strict

#OpenApi swagger (set false in prod)
springdoc.api-docs.enabled=true

# configuration des cookies
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax