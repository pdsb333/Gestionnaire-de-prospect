# Test-only JWT secret — carries no real security value (no production data behind it), safe to commit.
# Loaded on top of the main application.properties via @ActiveProfiles("test") (see AbstractIntegrationTest).
jwt.secret=dGVzdC1vbmx5LXNlY3JldC1uZXZlci11c2VkLWluLXByb2R1Y3Rpb24tZW52aXJvbm1lbnQ=

# High enough that a full integration test class hammering /api/auth/register or /login in a
# tight loop never trips the rate limiter meant for real-world brute-force/enumeration attempts.
auth.rate-limit.max-attempts=100000
